en:{name:"Nan Yao",short:"Nan",eyebrow:"AI product thinking · venture context · bilingual execution",title:"I turn ambiguous AI markets into product questions, workflow prototypes, and launchable operating systems.",about:"This portfolio is not a resume transcript. It is a map of how I think, research, and ship: from AI ecosystem signals to user scenarios, agent boundaries, product operations, and narratives that help teams act.",loc:"New York, NY",open:"Open to AI product manager, AI product operations, venture platform, and investment operations roles",nav:["Focus","Work","Experience","Education","Skills","Contact","CV","Email","View project","Open details"],mail:"yaonan1127@gmail.com",linkedin:"https://www.linkedin.com/in/yaonanstarry",metrics:[["AI PM","Product scenarios, workflows, agent boundaries"],["400K+","Top Rednote post views"],["4.0","NYU project management CGPA"]],focus:[["Product discovery from market noise","I translate startup, investor, and user signals into concrete product questions: who is blocked, what workflow breaks, what adoption risk matters, and what should be measured first."],["Agent workflow and safety design","I care about the unglamorous parts of agents: when they should act, when they should ask, what records are traceable, and how fallback/kill-switch logic protects trust."],["Operations that make ideas usable","I build SOPs, review templates, onboarding docs, feedback loops, event processes, and research systems so insights become repeatable team behavior."]],projects:[["Asana Challenge - Adaptive Sync","AI product case","PMs and cross-functional teams lose context across Slack, Jira, and Asana. I framed the problem as status drift plus late risk discovery, then designed an AI collaboration layer that detects tasks, owners, deadlines, blockers, and risk patterns from Slack and syncs them back into Asana.","Feb. 2026 - May 2026","",1,["User groups: PMs, team leads, and cross-functional contributors.","Core flow: detect tasks, generate Asana project structures, sync comments/status, and surface repeated blockers.","Product principle: no new tools and no new habits, so AI supports the current collaboration surface.","Safety and adoption: onboarding, permissions, audit logs, human-in-the-loop edits, fallback states, and user education."]],["Apexon Agent Challenge","Agent product ops case","I mapped enterprise delivery work where agents can reduce coordination drag without becoming opaque decision-makers: status collection, meeting summaries, weekly reports, reminders, and action-item follow-up.","May 2026","",1,["Defined what the agent should and should not do across delivery scenarios.","Designed confidence thresholds, traceable records, fallback handling, and kill switch logic.","Turned agent behavior into an operational framework teams can discuss, evaluate, and govern."]],["Wavo! AI Open Course Program","AI education project","Co-led a public AI education initiative for non-technical learners, coordinating partners including Volcano Engine, ZhenFund, Zhipu AI, and Devv.ai.","Oct. 2024 - Dec. 2024","https://mp.weixin.qq.com/s/0VYOR1ZFb41HbA2wt7oznQ",0,["Owned project coordination and public-facing communication with the team.","Helped convert AI product concepts into approachable learning material.","Balanced partner needs, learner clarity, and program execution rhythm."]],["Waves Odyssey","Market research project","Supported overseas-expansion research through market analysis, itinerary design, participant screening, and promotional visuals.","Jul. 2024 - Aug. 2024","https://mp.weixin.qq.com/s/zEojryWXUlqI9le5rpOWgA",0,["Researched market and participant context.","Supported project material design and execution coordination.","Kept the original project as part of the portfolio archive."]]],jobs:[["Oct. 2025 - Present","New York, NY","Investment Operations Intern","Monolith Capital",["AI startup tracking","Research systems","Product research"],"Built research infrastructure for AI startup and product tracking, turning market signals into structured views that support investment analysis.",["Built a tracking and tagging system across company, financing, product, team, and technical-route fields.","Managed a bilingual research pipeline covering foundation models, AI agents, and AI-native tools.","Produced market maps, competitive observations, positioning notes, trend briefs, and SOPs for data quality."]],["Apr. 2025 - Sep. 2025","Shanghai, China","Content Editor Intern","Crossing, AI Media Startup",["AI media","Editorial ops","Market research"],"Researched global AI startups and rebuilt editorial workflows so technical and venture topics could be produced faster and more clearly.",["Created newsletters, WeChat deep dives, podcast companion articles, and AI company/product research.","Standardized review templates and collaboration steps across topic selection, fact-checking, layout, and publishing.","Improved team production efficiency by about 40% and reduced repeated rework."]],["Nov. 2024 - Apr. 2025","Shanghai, China","Marketing Operations Intern","Linear Capital",["Venture platform","Brand ops","Events"],"Translated AI investment themes into content and helped run founder/investor-facing programs.",["Tracked AI themes from YC, a16z founder podcasts, and industry research.","Converted insights into original content and internal knowledge notes.","Supported a Demo Day with 100+ participants across process, partners, materials, on-site coordination, and review."]],["Jun. 2024 - Oct. 2024","Beijing, China","Media Operations Intern","36Kr - Waves",["Growth content","Rednote","SOP"],"Operated content as a growth and learning system, connecting AI startup topics with audience feedback and repeatable workflows.",["Grew the Rednote channel to 10,000+ followers.","Top post reached 400K+ views and 3,000+ interactions.","Built SOPs and tracking sheets for topic planning, publishing, review, and account data management."]]],edu:[["2025 - Present","New York University","M.S. in Project Management · CGPA 4.0 / 4.0 · focus on AI product implementation, organizational collaboration, and technology ethics"],["2021 - 2025","BNU-HKBU United International College","B.A. in Public Relations & Advertising · Second-Class Scholarship"],["Summer 2024","The University of Hong Kong","Summer Institute · Outstanding Performance · First Place Prize"],["Summer 2023","University of Edinburgh","Summer School · Business Communication and Social Media"]],skills:[["AI product tools",["DeepSeek","ChatGPT","Claude","Gemini","NotebookLM","Cursor","Perplexity","Manus","Midjourney"]],["Product and operations",["User scenario mapping","Journey design","SOP design","Feedback loops","Data tracking","FAQ/help docs"]],["AI PM methods",["Prompt design","Workflow decomposition","Competitive product testing","Agent boundary design","Risk/fallback planning"]],["General tools and languages",["Excel","PowerPoint","Notion","Figma","Canva","Photoshop","Mandarin native","English IELTS 7.0"]]]},

、AI Agent 与 AI-native 工具的中英双语研究 pipeline。","输出赛道图谱、竞品观察、产品定位、趋势摘要，并沉淀数据质量 SOP。"]],["2025.04 - 2025.09","上海","内容编辑实习生","十字路口 Crossing",["AI 媒体","编辑流程","市场研究"],"研究全球 AI 创业生态，并重构编辑流程，让技术与创投议题更高效、更清晰地被生产出来。",["输出 newsletter、公众号深度稿、podcast companion articles 与 AI 公司/产品研究。","标准化选题、事实核查、排版、发布等协作步骤。","团队内容生产效率提升约 40%，同时降低重复返工。"]],["2024.11 - 2025.04","上海","市场运营实习生","线性资本 Linear Capital",["创投平台","品牌运营","活动"],"把 AI 投资趋势转化为内容与内部知识，并支持创始人/投资人活动执行。",["通过 YC、a16z founder podcast 与行业研究追踪 AI 投资主题。","将洞察沉淀为原创内容与内部知识笔记。","参与 100+ 参会者 Demo Day 的流程、合作方、物料、现场协调与复盘。"]],["2024.06 - 2024.10","北京","媒体运营实习生","36氪 Waves 投资报道部",["增长内容","小红书","SOP"],"把内容当成增长和学习系统运营，将 AI 创业选题、用户反馈与可复制流程连接起来。",["负责小红书渠道从早期运营到 10,000+ 粉丝。","最高单篇阅读量 40w+、互动 3,000+。","建立选题、发布、复盘和账号数据管理 SOP。"]]],edu:[["2025 - 至今","纽约大学","项目管理硕士 M.S. · CGPA 4.0 / 4.0 · 关注 AI 产品落地、组织协作与技术伦理"],["2021 - 2025","北京师范大学-香港浸会大学联合国际学院","公关与广告学士 B.A. · 二等奖学金"],["2024 夏","香港大学","Summer Institute · Outstanding Performance · First Place Prize"],["2023 夏","爱丁堡大学","Summer School · Business Communication and Social Media"]],skills:[["AI 产品工具",["DeepSeek","ChatGPT","Claude","Gemini","NotebookLM","Cursor","Perplexity","Manus","Midjourney"]],["产品与运营",["用户场景拆解","体验链路设计","SOP 搭建","反馈闭环","数据追踪","FAQ/帮助文档"]],["AI PM 方法",["Prompt 设计","AI 工作流拆解","竞品体验分析","Agent 边界设计","风险/兜底机制"]],["通用工具与语言",["Excel","PowerPoint","Notion","Figma","Canva","Photoshop","中文母语","英文 IELTS 7.0"]]]}}

<header class="hero"><div class="shell heroGrid"><section class="reveal"><p class="eyebrow">${t.eyebrow}</p><h1>${t.name}</h1><p class="lead">${t.title}</p><p class="copy">${t.about}</p><div class="row"><a class="btn primary" href="mailto:${t.mail}">${n[7]}</a><a class="btn" href="${t.linkedin}" target="_blank" rel="noopener">LinkedIn</a><a class="btn" href="${CV}" target="_blank" rel="noopener">${n[6]}</a></div><div class="metrics">${t.metrics.map(m=>`<div class="metric"><b>${m[0]}</b><span>${m[1]}</span></div>`).join("")}</div></section><aside class="portraitCard reveal"><div class="portrait"><img src="${IMG}" alt="${t.name}"></div><p class="note">${t.loc} · ${t.open}</p></aside></div></header>
<main class="shell"><section class="section" id="focus"><div class="head reveal"><p class="label">${n[0]}</p><h2>${lang==="en"?"The homepage should make the first read simple, then let the serious reader open the proof.":"首页先给清晰判断，再让认真阅读的人展开证据。"}</h2></div><div class="grid3">${t.focus.map(f=>`<article class="card focus reveal"><h3>${f[0]}</h3><p>${f[1]}</p></article>`).join("")}</div></section>
<section class="section" id="work"><div class="head reveal"><p class="label">${n[1]}</p><h2>${lang==="en"?"Selected work, framed as product questions rather than resume bullets.":"代表作品以产品问题呈现，而不是简历条目堆叠。"}</h2></div><div class="grid2">${t.projects.map(p=>`<article class="card project ${p[5]?"highlight":""} reveal"><div><p class="meta">${p[1]} · ${p[3]}</p><h3>${p[0]}</h3><p>${p[2]}</p><details><summary>${n[9]}</summary>${lis(p[6])}</details></div>${p[4]?`<a class="plink" href="${p[4]}" target="_blank" rel="noopener">${n[8]}</a>`:`<span class="plink muted">${n[9]}</span>`}</article>`).join("")}</div></section>
<section class="section" id="experience"><div class="head reveal"><p class="label">${n[2]}</p><h2>${lang==="en"?"Experience timeline with one-line takeaways first, details only when needed.":"经历用一句话先讲价值，细节按需展开。"}</h2></div><div class="timeline">${t.jobs.map(j=>`<article class="job reveal"><div class="time"><b>${j[0]}</b><span>${j[1]}</span></div><div><h3>${j[2]}</h3><p class="company">${j[3]}</p><div class="tagrow">${j[4].map(tag).join("")}</div><p class="copy">${j[5]}</p><details><summary>${n[9]}</summary>${lis(j[6])}</details></div></article>`).join("")}</div></section>
<section class="section two"><div id="education"><div class="head reveal"><p class="label">${n[3]}</p><h2>${lang==="en"?"Education":"教育背景"}</h2></div><div class="list">${t.edu.map(e=>`<article class="item reveal"><p class="period">${e[0]}</p><h3>${e[1]}</h3><p>${e[2]}</p></article>`).join("")}</div></div><div id="skills"><div class="head reveal"><p class="label">${n[4]}</p><h2>${lang==="en"?"Skills":"能力栈"}</h2></div><div class="list">${t.skills.map(s=>`<article class="item reveal"><h3>${s[0]}</h3><div class="skillTags">${s[1].map(x=>`<span>${x}</span>`).join("")}</div></article>`).join("")}</div></div></section></main>
<footer class="footer" id="contact"><div class="shell foot"><div><h2>${lang==="en"?"Let’s build useful AI workflows.":"一起搭建真正有用的 AI 工作流。"}</h2><p>${t.mail}${lang==="zh"?" · 微信 "+t.wechat:""}</p></div><div class="row"><a class="btn primary" href="mailto:${t.mail}">${n[7]}</a><a class="btn" href="${t.linkedin}" target="_blank" rel="noopener">LinkedIn</a><a class="btn" href="${CV}" target="_blank" rel="noopener">${n[6]}</a></div></div></footer>`;requestAnimationFrame(()=>{let ob=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add("visible");ob.unobserve(e.target)}}),{threshold:.12});document.querySelectorAll(".reveal").forEach(x=>ob.observe(x))})}
function toggleLang(){lang=lang==="en"?"zh":"en";try{window.localStorage?.setItem("portfolio-redesign-lang",lang)}catch(e){}render()}
render();
</script></body>
</html>
