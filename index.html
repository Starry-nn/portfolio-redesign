    :root {
      --bg: #f7f8f6;
      --panel: #ffffff;
      --ink: #17201d;
      --muted: #64706b;
      --line: #dfe5df;
      --accent: #226f67;
      --accent-2: #315b86;
      --warm: #9a6a36;
      --shadow: 0 18px 48px rgba(23, 32, 29, 0.08);
      color-scheme: light;
      scroll-behavior: smooth;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.6;
      text-rendering: optimizeLegibility;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .shell {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid rgba(223, 229, 223, 0.88);
      background: rgba(247, 248, 246, 0.92);
      backdrop-filter: blur(16px);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 68px;
      gap: 20px;
    }

    .brand {
      font-weight: 800;
      letter-spacing: 0;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 22px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 650;
    }

    .nav-links a:hover {
      color: var(--ink);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      font-size: 14px;
      font-weight: 750;
      cursor: pointer;
      transition: border-color 160ms ease, background 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .button:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
    }

    .button.primary {
      border-color: var(--ink);
      background: var(--ink);
      color: #fff;
    }

    .button.primary:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .hero {
      padding: 76px 0 72px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(120deg, rgba(34, 111, 103, 0.08), transparent 34%),
        linear-gradient(300deg, rgba(49, 91, 134, 0.08), transparent 38%);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 64px;
      align-items: center;
    }

    .eyebrow {
      display: inline-flex;
      margin: 0 0 18px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      max-width: 780px;
      font-size: clamp(48px, 8vw, 86px);
      line-height: 0.98;
      letter-spacing: 0;
      font-weight: 850;
    }

    .hero-title {
      max-width: 780px;
      margin-top: 24px;
      color: #2e3b36;
      font-size: clamp(21px, 2.8vw, 34px);
      line-height: 1.2;
      font-weight: 760;
    }

    .hero-copy {
      max-width: 720px;
      margin-top: 24px;
      color: var(--muted);
      font-size: 17px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 32px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-top: 40px;
      max-width: 720px;
    }

    .metric {
      padding-left: 16px;
      border-left: 2px solid var(--line);
    }

    .metric strong {
      display: block;
      font-size: 26px;
      line-height: 1;
    }

    .metric span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .portrait-card {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .portrait {
      aspect-ratio: 4 / 5;
      overflow: hidden;
      border-radius: 6px;
      background: #eef1ee;
    }

    .portrait img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .portrait-note {
      padding: 14px 4px 2px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 650;
    }

    main {

    .section {
      margin-top: 88px;
    }

    .section:first-child {
      margin-top: 0;
    }

    .section-head {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 32px;
      align-items: start;
      margin-bottom: 34px;
    }

    .section-label {

      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.16em;
      text-transform: uppercase;

    .section h2 {

      font-size: clamp(28px, 4vw, 46px);
      line-height: 1.12;
      font-weight: 820;
    }

    .focus-grid,
    .project-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .project-grid {
      grid-template-columns: repeat(2, 1fr);
    }

      background: rgba(255, 255, 255, 0.82);

    .timeline {

      left: 0;
      width: 6px;
      height: 6px;

      .section {

</head>

            link: "https://mp.weixin.qq.com/s/zEojryWXUlqI9le5rpOWgA",
            desc: "支持企业出海研究项目，参与市场分析、行程设计、参与者筛选与宣传材料视觉制作。",
          },
        ],
        education: [
          { school: "纽约大学", degree: "项目管理硕士 M.S.", period: "2025 - 至今" },
          { school: "北京师范大学-香港浸会大学联合国际学院", degree: "公关与广告学士 B.A.", period: "2021 - 2025", awards: "二等奖学金" },
          { school: "香港大学", degree: "Summer Institute · Introduction to the World of Business Media", period: "2024 夏", awards: "Outstanding Performance · First Place Prize" },
          { school: "爱丁堡大学", degree: "Summer School · Business Communication and Social Media", period: "2023 夏" },
        ],
        skills: [
          { name: "AI 与产品工具", items: ["ChatGPT", "Claude", "Gemini", "Cursor", "Midjourney", "AI 产品研究"] },
          { name: "创投与运营", items: ["Deal-flow 跟踪", "投资 memo", "SOP 设计", "数据集结构化", "活动运营"] },
          { name: "媒体与增长", items: ["Newsletter", "播客文章", "微信公众号", "小红书", "Campaign 策划"] },
          { name: "语言", items: ["普通话母语", "英语专业工作", "粤语"] },
        ],
      },
    };

    let lang = localStorage.getItem("portfolio-redesign-lang") || "en";

    function navLink(href, label) {
      return `<a href="${href}">${label}</a>`;
    }

    function render(t) {
      const jobs = t.experience.map(job => `
        <article class="job reveal">
          <div class="job-meta">
            <strong>${job.period}</strong>
            <span>${job.location}</span>
          </div>
          <div>
            <h3>${job.role}</h3>
            <p class="company">${job.company}</p>
            <div class="tags">${job.tags.map(tag => `<span class="tag">${tag}</span>`).join("")}</div>
            <ul>${job.points.map(point => `<li>${point}</li>`).join("")}</ul>
          </div>
        </article>
      `).join("");

      const focus = t.focus.map(item => `
        <article class="card focus-card reveal">
          <h3>${item.title}</h3>
          <p>${item.text}</p>
        </article>
      `).join("");

      const projects = t.projects.map(project => `
        <a class="card project-card reveal" href="${project.link}" target="_blank" rel="noopener noreferrer">
          <div>
            <p class="project-meta">${project.role} · ${project.period}</p>
            <h3>${project.name}</h3>
            <p>${project.desc}</p>
          </div>
          <span class="project-link">${t.nav.view}</span>
        </a>
      `).join("");

      const education = t.education.map(item => `
        <article class="education-card reveal">
          <p class="period">${item.period}</p>
          <h3>${item.school}</h3>
          <p>${item.degree}${item.awards ? ` · ${item.awards}` : ""}</p>
        </article>
      `).join("");

      const skills = t.skills.map(group => `
        <article class="skill-group reveal">
          <h3>${group.name}</h3>
          <div class="skill-tags">${group.items.map(item => `<span>${item}</span>`).join("")}</div>
        </article>
      `).join("");

      document.documentElement.lang = lang === "zh" ? "zh-CN" : "en";
      document.getElementById("app").innerHTML = `
        <nav class="nav">
          <div class="shell nav-inner">
            <a class="brand" href="#">${t.shortName}</a>
            <div class="nav-links">
              ${navLink("#focus", t.nav.focus)}
              ${navLink("#experience", t.nav.experience)}
              ${navLink("#projects", t.nav.projects)}
              ${navLink("#education", t.nav.education)}
              ${navLink("#contact", t.nav.contact)}
            </div>
            <div class="nav-actions">
              <a class="button" href="https://starry-nn.github.io/Nan_Yao_Resume.pdf" target="_blank" rel="noopener noreferrer">${t.nav.resume}</a>
              <button class="button primary" type="button" onclick="toggleLang()">${lang === "en" ? "中文" : "EN"}</button>
            </div>
          </div>
        </nav>

        <header class="hero">
          <div class="shell hero-grid">
            <section class="reveal">
              <p class="eyebrow">${t.eyebrow}</p>
              <h1>${t.name}</h1>
              <p class="hero-title">${t.title}</p>
              <p class="hero-copy">${t.about}</p>
              <div class="hero-actions">
                <a class="button primary" href="mailto:${t.contact.email}">${t.nav.email}</a>
                <a class="button" href="${t.contact.linkedin}" target="_blank" rel="noopener noreferrer">LinkedIn</a>
                <a class="button" href="https://starry-nn.github.io/Nan_Yao_Resume.pdf" target="_blank" rel="noopener noreferrer">${t.nav.resume}</a>
              </div>
              <div class="metrics">
                ${t.metrics.map(metric => `<div class="metric"><strong>${metric.value}</strong><span>${metric.label}</span></div>`).join("")}
              </div>
            </section>
            <aside class="portrait-card reveal">
              <div class="portrait"><img src="https://starry-nn.github.io/profile01.JPG" alt="${t.name}" /></div>
              <p class="portrait-note">${t.location} · ${t.availability}</p>
            </aside>
          </div>
        </header>

        <main class="shell">
          <section class="section" id="focus">
            <div class="section-head reveal">
              <p class="section-label">${t.nav.focus}</p>
              <h2>${lang === "en" ? "A practical bridge between AI markets, venture workflows, and audience-facing narratives." : "连接 AI 市场、创投工作流与面向受众叙事的实践型桥梁。"}</h2>
            </div>
            <div class="focus-grid">${focus}</div>
          </section>

          <section class="section" id="experience">
            <div class="section-head reveal">
              <p class="section-label">${t.nav.experience}</p>
              <h2>${lang === "en" ? "Experience built around research quality, operating rhythm, and scalable content systems." : "围绕研究质量、执行节奏与可规模化内容系统展开的经历。"}</h2>
            </div>
            <div class="timeline">${jobs}</div>
          </section>

          <section class="section" id="projects">
            <div class="section-head reveal">
              <p class="section-label">${t.nav.projects}</p>
              <h2>${lang === "en" ? "Selected projects across AI education and global business research." : "AI 教育与全球化商业研究方向的代表项目。"}</h2>
            </div>
            <div class="project-grid">${projects}</div>
          </section>

          <section class="section two-col">
            <div id="education">
              <div class="section-head reveal">
                <p class="section-label">${t.nav.education}</p>
                <h2>${lang === "en" ? "Education" : "教育背景"}</h2>
              </div>
              <div class="education-list">${education}</div>
            </div>
            <div id="skills">
              <div class="section-head reveal">
                <p class="section-label">${t.nav.skills}</p>
                <h2>${lang === "en" ? "Skills" : "能力栈"}</h2>
              </div>
              <div class="skill-list">${skills}</div>
            </div>
          </section>
        </main>

        <footer class="footer" id="contact">
          <div class="shell footer-inner">
            <div>
              <h2>${lang === "en" ? "Let’s build useful AI workflows." : "一起搭建真正有用的 AI 工作流。"}</h2>
              <p>${t.contact.email}${lang === "zh" ? ` · 微信 ${t.contact.wechat}` : ""}</p>
            </div>
            <div class="contact-row">
              <a class="button primary" href="mailto:${t.contact.email}">${t.nav.email}</a>
              <a class="button" href="${t.contact.linkedin}" target="_blank" rel="noopener noreferrer">LinkedIn</a>
              <a class="button" href="https://starry-nn.github.io/Nan_Yao_Resume.pdf" target="_blank" rel="noopener noreferrer">${t.nav.resume}</a>
            </div>
          </div>
        </footer>
      `;

      requestAnimationFrame(() => {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add("visible");
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.12 });
        document.querySelectorAll(".reveal").forEach(node => observer.observe(node));
      });
    }

    window.toggleLang = function () {
      lang = lang === "en" ? "zh" : "en";
      localStorage.setItem("portfolio-redesign-lang", lang);
      render(content[lang]);
    };

    render(content[lang]);
  </script>
</body>
</html>
