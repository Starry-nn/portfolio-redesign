let lang="en";try{lang=window.localStorage?.getItem("portfolio-redesign-lang")||"en"}catch(e){};const app=document.getElementById("app");
const tag=x=>`<span class="tag">${x}</span>`,lis=a=>`<ul>${a.map(x=>`<li>${x}</li>`).join("")}</ul>`;
function contactButtons(t,n){return `<a class="btn primary" href="mailto:${t.mail}"><span class="icon">✉</span>${n[7]}</a><a class="btn" href="${t.linkedin}" target="_blank" rel="noopener"><img class="icon" src="${LINKEDIN_IMG}" alt="">LinkedIn</a><a class="btn" href="${CV}" target="_blank" rel="noopener">📄 ${n[6]}</a>`}
function render(){const t=D[lang],n=t.nav;document.documentElement.lang=lang==="zh"?"zh-CN":"en";app.innerHTML=`<nav class="nav"><div class="shell navin"><a class="brand" href="#">${t.short}</a><div class="links"><a href="#experience">${n[0]}</a><a href="#work">${n[1]}</a><a href="#focus">${n[2]}</a><a href="#education">${n[3]}</a><a href="#contact">${n[5]}</a></div><div class="actions"><a class="btn" href="${CV}" target="_blank" rel="noopener">📄 ${n[6]}</a><button class="btn primary" onclick="toggleLang()">${lang==="en"?"中文":"EN"}</button></div></div></nav>
<header class="hero"><div class="shell heroGrid"><section class="reveal"><p class="eyebrow">${t.eyebrow}</p><h1>${t.name}</h1><p class="lead">${t.title}</p><p class="copy">${t.about}</p><div class="row">${contactButtons(t,n)}</div><div class="metrics">${t.metrics.map(m=>`<div class="metric"><b>${m[0]}</b><span>${m[1]}</span></div>`).join("")}</div></section><aside class="portraitCard reveal"><div class="portrait"><img src="${IMG}" alt="${t.name}"></div></aside></div></header>
<main class="shell"><section class="section" id="experience"><div class="sectionHead reveal"><p class="label">${n[0]}</p><div><h2>${lang==="en"?"Working across AI products, venture research, and operating systems.":"在 AI 产品、创投研究与运营系统之间工作。"}</h2><p>${lang==="en"?"Each role strengthened a different layer of my product judgment: market sensing, user-facing narrative, research infrastructure, and repeatable execution.":"每段经历都补强了我产品判断的不同层面：市场感知、面向用户的表达、研究基础设施，以及可复用的执行机制。"}</p></div></div><div class="workList">${t.jobs.map(j=>`<article class="job reveal"><div class="time"><b>${j[0]}</b><span>${j[1]}</span></div><div><h3>${j[2]}</h3><p class="role">${j[3]}</p><div class="tagrow">${j[4].map(tag).join("")}</div><p class="jobText">${j[5]}</p>${lis(j[6])}</div></article>`).join("")}</div></section>
<section class="section" id="work"><div class="sectionHead reveal"><p class="label">${n[1]}</p><div><h2>${lang==="en"?"Selected work":"代表作品"}</h2><p>${lang==="en"?"Projects that show how I frame AI product problems, design workflows, and translate abstract technology into usable experiences.":"这些项目展示我如何定义 AI 产品问题、设计工作流，并把抽象技术转成更可使用的体验。"}</p></div></div><div class="grid2">${t.projects.map(p=>`<article class="project ${p[5]?"featured":""} reveal"><div><p class="meta">${p[1]} · ${p[3]}</p><h3>${p[0]}</h3><p>${p[2]}</p>${lis(p[6])}</div>${p[4]?`<a class="plink" href="${p[4]}" target="_blank" rel="noopener">${n[8]} →</a>`:""}</article>`).join("")}</div></section>
<section class="section" id="focus"><div class="sectionHead reveal"><p class="label">${n[2]}</p><div><h2>${lang==="en"?"How I think about AI product work":"我如何理解 AI 产品工作"}</h2><p>${lang==="en"?"Good AI products need more than model capability. They need crisp scenarios, trust design, and operations that make the product easy to adopt.":"好的 AI 产品不只需要模型能力，也需要清晰场景、信任设计，以及能让产品被采用的运营机制。"}</p></div></div><div class="grid3">${t.focus.map(f=>`<article class="focus reveal"><h3>${f[0]}</h3><p>${f[1]}</p></article>`).join("")}</div></section>
<section class="section two"><div id="education"><div class="sectionHead reveal"><p class="label">${n[3]}</p><div><h2>${lang==="en"?"Education":"教育背景"}</h2></div></div><div class="list">${t.edu.map(e=>`<article class="item reveal"><p class="period">${e[0]}</p><h3>${e[1]}</h3><p>${e[2]}</p></article>`).join("")}</div></div><div id="skills"><div class="sectionHead reveal"><p class="label">${n[4]}</p><div><h2>${lang==="en"?"Skills":"能力栈"}</h2></div></div><div class="list">${t.skills.map(s=>`<article class="item reveal"><h3>${s[0]}</h3><div class="skillTags">${s[1].map(x=>`<span>${x}</span>`).join("")}</div></article>`).join("")}</div></div></section></main>
<footer class="footer" id="contact"><div class="shell foot"><div><h2>${lang==="en"?"Let’s build useful AI workflows.":"一赛搭建真正有用的 AI 工作流。"}</h2><p>${t.mail}${lang==="zh"?" · 微信 "+t.wechat:""}</p></div><div class="row">${contactButtons(t,n)}</div></div></footer>`;requestAnimationFrame(()=>{let ob=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add("visible");ob.unobserve(e.target)}}),{threshold:.12});document.querySelectorAll(".reveal").forEach(x=>ob.observe(x))})}
function toggleLang(){lang=lang==="en"?"zh":"en";try{window.localStorage?.setItem("portfolio-redesign-lang",lang)}catch(e){}render()}
render();
</script></body>
</html>
